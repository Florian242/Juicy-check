services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5005:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://floriandoudoutejuicycheck:juicycheck@db:5432/floriandoudoutejuicycheck
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: floriandoudoutejuicycheck
      POSTGRES_PASSWORD: juicycheck
      POSTGRES_DB: floriandoudoutejuicycheck
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U floriandoudoutejuicycheck"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: